<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make a Payment — Hayden C. Scott</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,500;0,6..96,700;1,6..96,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0b0b0c;
    --panel: #141416;
    --ivory: #ece7dd;
    --ivory-dim: #a8a29a;
    --rust: #b5432c;
    --rust-bright: #d5573a;
    --line: #2a2a2c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, #1c1a19 0%, var(--black) 60%),
      var(--black);
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .stub {
    position: relative;
    width: 100%;
    max-width: 460px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 48px 40px 40px;
  }

  .stub::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 100%;
    background: var(--rust);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--rust-bright);
    margin: 0 0 14px;
  }

  h1 {
    font-family: 'Bodoni Moda', serif;
    font-weight: 700;
    font-style: italic;
    font-size: 34px;
    line-height: 1.15;
    margin: 0 0 6px;
    color: var(--ivory);
  }

  .sub {
    font-size: 14px;
    color: var(--ivory-dim);
    margin: 0 0 36px;
    line-height: 1.5;
  }

  label {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ivory-dim);
    margin-bottom: 8px;
  }

  .field { margin-bottom: 24px; }

  .amount-row {
    display: flex;
    align-items: baseline;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    transition: border-color 0.2s ease;
  }

  .amount-row:focus-within { border-color: var(--rust-bright); }

  .amount-row .dollar {
    font-family: 'Bodoni Moda', serif;
    font-size: 28px;
    color: var(--ivory-dim);
    margin-right: 8px;
  }

  input[type="number"] {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Bodoni Moda', serif;
    font-size: 32px;
    color: var(--ivory);
    width: 100%;
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type="number"] { -moz-appearance: textfield; }

  textarea {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    outline: none;
    color: var(--ivory);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 72px;
    transition: border-color 0.2s ease;
  }

  textarea:focus { border-color: var(--rust-bright); }

  textarea::placeholder, input::placeholder { color: #5a5652; }

  .hint {
    font-size: 12px;
    color: var(--ivory-dim);
    margin-top: 6px;
    line-height: 1.4;
  }

  button {
    width: 100%;
    background: var(--rust);
    color: var(--ivory);
    border: none;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s ease, transform 0.1s ease;
  }

  button:hover { background: var(--rust-bright); }
  button:active { transform: translateY(1px); }
  button:disabled { background: #4a3a35; cursor: not-allowed; }

  .error {
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--rust-bright);
    margin-top: 14px;
    line-height: 1.5;
  }

  .error.visible { display: block; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #5a5652;
    margin-top: 28px;
    letter-spacing: 0.04em;
  }

  .canceled-banner {
    display: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ivory-dim);
    border: 1px solid var(--line);
    padding: 12px 14px;
    margin-bottom: 28px;
  }

  .canceled-banner.visible { display: block; }
</style>
</head>
<body>

<div class="stub">
  <p class="eyebrow">Session &nbsp;·&nbsp; Invoice &nbsp;·&nbsp; Rental</p>
  <h1>Make a payment</h1>
  <p class="sub">Enter the amount and what it's for. If you're paying an invoice, include the invoice number in the note.</p>

  <div class="canceled-banner" id="canceledBanner">Payment canceled. Nothing was charged — try again below.</div>

  <form id="payForm">
    <div class="field">
      <label for="amount">Amount (USD)</label>
      <div class="amount-row">
        <span class="dollar">$</span>
        <input type="number" id="amount" name="amount" min="5" step="1" placeholder="0" required>
      </div>
      <p class="hint">$5 minimum.</p>
    </div>

    <div class="field">
      <label for="note">What's this for?</label>
      <textarea id="note" name="note" placeholder="e.g. Invoice #0042, Gear rental deposit, MD session — Jan 12" required></textarea>
    </div>

    <button type="submit" id="submitBtn">Continue to payment</button>
    <p class="error" id="errorMsg"></p>
  </form>

  <p class="footer-note">Payments processed securely by Stripe</p>
</div>

<script>
  const form = document.getElementById('payForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  const params = new URLSearchParams(window.location.search);
  if (params.get('canceled') === 'true') {
    document.getElementById('canceledBanner').classList.add('visible');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.remove('visible');
    errorMsg.textContent = '';

    const amount = document.getElementById('amount').value;
    const note = document.getElementById('note').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Redirecting…';

    try {
      const res = await fetch('/.netlify/functions/create-checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, note }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Something went wrong.');
      }

      window.location.href = data.url;
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.add('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Continue to payment';
    }
  });
</script>

</body>
</html>
